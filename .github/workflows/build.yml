# ─────────────────────────────────────────────────────────────────────────────
# Build & validate ESP32-C6 Zigbee Router firmware
#
# IDF version note:
#   sdkconfig.defaults says "ESP-IDF 6.2.0" in a generated comment, but
#   that only reflects the local toolchain used to run idf.py save-defconfig.
#   idf_component.yml declares compatibility with IDF >=5.2.
#   espressif/idf:v6.2.0 does NOT exist on Docker Hub (as of 2026-06).
#   Valid tag formats: release-vX.Y | vX.Y.Z  (must exist on Docker Hub)
#   Check available tags: https://hub.docker.com/r/espressif/idf/tags
#   Update IDF_VERSION below when Espressif publishes a newer image.
#
# Triggers:
#   • push / PR targeting main (skips docs-only changes)
#   • manual (workflow_dispatch)
# ─────────────────────────────────────────────────────────────────────────────
name: Build ESP32-C6 Zigbee Router

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # ⚠️  Must be a tag that EXISTS on hub.docker.com/r/espressif/idf/tags
  # espressif/idf:v6.2.0 does NOT exist — use release-vX.Y format.
  IDF_VERSION: release-v5.4
  IDF_TARGET:  esp32c6
  # Component manager cache dir — mounted into the container via -DIDF_COMPONENT_MANAGER_CACHE_DIR
  IDF_COMPONENT_CACHE_DIR: /tmp/idf_component_cache

jobs:
  build:
    name: idf.py build (esp32c6)
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── 2. Cache: IDF Component Manager ────────────────────────────────────
      # NOTE: ~/.espressif lives INSIDE the Docker container — caching it
      # on the host runner has zero effect. Only the component manager
      # download cache (mapped via IDF_COMPONENT_MANAGER_CACHE_DIR) is
      # useful to persist between runs.
      - name: Cache IDF component manager
        uses: actions/cache@v4
        with:
          path: ${{ env.IDF_COMPONENT_CACHE_DIR }}
          key: idf-components-${{ env.IDF_VERSION }}-${{ hashFiles('main/idf_component.yml') }}
          restore-keys: |
            idf-components-${{ env.IDF_VERSION }}-
            idf-components-

      # ── 3. Build + size report (single Docker invocation) ──────────────────
      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: ${{ env.IDF_VERSION }}
          target: ${{ env.IDF_TARGET }}
          path: '.'
          command: >
            idf.py
            -DIDF_COMPONENT_MANAGER_CACHE_DIR=${{ env.IDF_COMPONENT_CACHE_DIR }}
            set-target ${{ env.IDF_TARGET }}
            fullclean
            build
            size

      # ── 4. Upload artefacts (success) ─────────────────────────────────────
      - name: Upload firmware binaries
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: firmware-esp32c6-${{ github.sha }}
          path: |
            build/*.bin
            build/*.elf
            build/*.map
            build/size_summary.json
          retention-days: 14

      # ── 5. Upload build dir on failure (post-mortem) ─────────────────────
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-failure-${{ github.run_id }}
          path: build/
          retention-days: 7
